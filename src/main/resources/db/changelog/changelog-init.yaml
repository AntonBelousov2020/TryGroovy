databaseChangeLog:
  - changeSet:
      id: create-sequence-health-history
      author: abelousov
      preConditions:
        onFail: "MARK_RAN"
        not:
          sequenceExists:
            sequenceName: "health_history_changelog_seq"
      createSequence:
        sequenceName: "health_history_changelog_seq"
        startValue: "1"
        incrementBy: "1"

  - changeSet:
      id: 001-create-medical-history
      author: abelousov

      changes:
        - createTable:
            tableName: medical_history
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: diagnosis
                  type: VARCHAR(255)

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

      rollback:
        - dropTable:
            tableName: medical_history